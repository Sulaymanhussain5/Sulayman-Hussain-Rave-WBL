<!DOCTYPE html>
<html>

<head>
    <title>HOMEPAGE</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/global.css">
    <link rel="stylesheet" href="CSS/header.css">
    <link rel="stylesheet" href="CSS/footer.css">
    <link rel="stylesheet" href="CSS/chatbot.css">
    <link rel="stylesheet" href="CSS/account_management_page.css"> 
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"> 

</head>

<body>
    <div class="navigationBoxContainer">
        <header>
            <nav class="navigationBox">
                <a href="1.0_studentPortal_homepage.html"><img src="Assets/rave_wbl_logo_v2.png" class="rave-wbl-logo"></a>
                <a href="1.1_course.html" class="links">Course</a>
                <a href="1.2_account_management_page.html" class="links">Acccount Management</a>
                <a href="1.3_about_rave_wbl_page.html" class="links">About Rave WBL</a>
                <a href="1.4_account_page.html"><img src="Assets/account_icon.png" class="accountIcon"></a>
            </nav>
        </header>
    </div>
    <br></br>

    <div class="chatbot-container">
        <button class="chatbot-button"><img src="Assets/chat_icon.png"></button>
    </div>

    <div class="management_container">
        <form name="management_container" action="http://localhost:8080/account_management">
            <img src="Assets/account_icon.png" id="profilePic" width="200px" height="200px">
            <input type="file" id="inputImage" value="Change Photo" onchange="accountInput(event)">
            <div class="personal-statement-field">
                <h1>PERSONAL STATEMENT</h1>
                <label for="Student_id">Student ID</label><input type="number" id="Student_id" required><br></br>
                <label for="First_Name">First Name*</label><input type="text" id="First_Name" required><br></br>
                <label for="Middle_Name">Middle Name</label><input type="text" id="Middle_Name" ><br></br>
                <label for="Last_Name">Last Name*</label><input type="text" id="Last_Name" required><br></br>
                <label for="Student_Email">Email Address*</label><input type="email" id="Student_Email" required><br></br>
                <label for="Course">Course*</label><input type="text" id="Course" required><br></br>
                <label for="Gender">Gender*</label><input type="text" id="Gender"  required><br></br>
            </div>
    
            <div class="skills-field">
                <h1 style="font-size: 24px;">SKILLS</button></h1>
                <span><input type="text" id="Skills"><button type="button" id="addSkillBtn">ADD</button></span>
                <ul id="skillList" style="display: none;"></ul>
            </div>
    
    
            <div class="avalability-field">
                <h1 style="font-size: 24px;">AVALABILITY</h1>
                <span><input type="text" id="Availability" ><button type="button" id="addAvalabilityBtn">Add</button></span>
                <ul id="avalabilityList" style="display: none;"></ul>
            </div>
    
            <div class="certification-field">
                <h1 style="font-size: 24px;">CERTIFICATION</h1>
                <input type="text" id="Certificate_Name" required> <button type="button" id="addCertification">ADD</button>
                <ul id="certificationList" style="display: none;"></ul>
            </div>
    
            <div class="experience-field">
                <h1 style="font-size: 24px;">EXPERIENCE</h1>
                <input type="text" id="Experience_Name" required> <button type="button" id="addExperiences">ADD</button>
                <ul id="experienceList" style="display: none;"></ul>
            </div>
    
            <div class="document-field">
                <h1 style="font-size: 24px;">DOCUMENT</h1>
                <label>Document</label><input type="file" accept="application/pdf" multiple="multiple" id="Document">
                <ui id="documentList" style="display: none;"></ui>
            </div>
        </form>
    </div>
    <br></br>
    <button type="submit" onclick="Account_Management(event)">Submit</button>

    <div class="footer-container">
        <footer>
            <img src="Assets/rave_wbl_logo_v2.png">
            <p>Copyright &copy; Rave WBL All Rights Reserved</p>
        </footer>
    </div>

<script src="JavaScript/account_management.js"></script>
<!--<script src="JavaScript/file_insert.js"></script> -->
</body>

</html>
